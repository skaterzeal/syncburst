name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.23.x", stable]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: Format check
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build static binary
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath ./cmd/syncburst

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Test with race detector
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  fuzz-smoke:
    name: Fuzz smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Request parser fuzz smoke test
        run: go test ./internal/request -run '^$' -fuzz FuzzParseFile -fuzztime 5s
      - name: HPACK fuzz smoke test
        run: go test ./internal/http2 -run '^$' -fuzz FuzzStatusFromBlock -fuzztime 5s

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Scan
        run: govulncheck ./...
