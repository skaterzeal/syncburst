name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64
          do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            name="syncburst_${VERSION}_${GOOS}_${GOARCH}"
            stage="dist/${name}"
            mkdir -p "${stage}"
            cp README.md LICENSE "${stage}/"
            binary="syncburst"
            if [ "${GOOS}" = windows ]; then binary="syncburst.exe"; fi
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${stage}/${binary}" \
              ./cmd/syncburst
            if [ "${GOOS}" = windows ]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "${stage}"
          done
          (cd dist && sha256sum syncburst_*.tar.gz syncburst_*.zip > checksums.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: gh release create "${VERSION}" dist/* --verify-tag --generate-notes --title "${VERSION}"
